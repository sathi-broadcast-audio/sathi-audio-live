<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sathi Audio Live</title>
    <!-- FontAwesome for attractive icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; }
        
        /* Sign Up / Name Input Popup */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 15, 26, 0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; transition: 0.5s; }
        .login-box { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 30px 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .login-logo { font-size: 40px; color: #ff4757; margin-bottom: 15px; animation: pulse 2s infinite; }
        .login-title { font-size: 24px; font-weight: bold; margin-bottom: 25px; background: linear-gradient(to right, #ff4757, #ff6b81); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 12px 20px; color: white; font-size: 16px; outline: none; text-align: center; margin-bottom: 20px; transition: 0.3s; }
        .login-input:focus { border-color: #00adb5; box-shadow: 0 0 10px rgba(0, 173, 181, 0.4); }
        .btn-enter { width: 100%; background: linear-gradient(to right, #00adb5, #00fff2); color: #1a1a2e; font-weight: bold; border: none; padding: 12px; border-radius: 30px; font-size: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 173, 181, 0.3); }
        .btn-enter:hover { transform: scale(1.02); }

        /* Main Content App Area */
        .app-content { display: none; width: 100%; max-width: 500px; flex-direction: column; gap: 15px; }
        
        /* Header & Logo */
        .header { text-align: center; margin-bottom: 15px; width: 100%; max-width: 500px; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .logo-icon { font-size: 28px; color: #ff4757; }
        .logo-text { font-size: 22px; font-weight: bold; letter-spacing: 1px; background: linear-gradient(to right, #ff4757, #ff6b81); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Seats Stage Layout */
        .stage { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px; }
        
        /* Seat Design */
        .seat { display: flex; flex-direction: column; align-items: center; position: relative; cursor: pointer; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; background: #222831; border: 2px dashed #00adb5; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #00adb5; transition: all 0.3s; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .seat-name { font-size: 11px; margin-top: 6px; color: #eee; font-weight: 500; text-shadow: 1px 1px 2px #000; text-align: center; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .seat.occupied .avatar { border-style: solid; background: #0f3460; color: #fff; }
        
        /* Floating Emoji on Seats */
        .emoji-bubble { position: absolute; top: -20px; background: rgba(0,0,0,0.8); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 18px; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 10; }
        .emoji-bubble.show { opacity: 1; transform: translateY(0); animation: floatUp 1.5s ease-out forwards; }

        @keyframes floatUp { 0% { opacity: 0; transform: translateY(10px) scale(0.5); } 20% { opacity: 1; transform: translateY(0) scale(1.2); } 80% { opacity: 1; transform: translateY(-15px) scale(1); } 100% { opacity: 0; transform: translateY(-30px) scale(0.8); } }

        /* Row 1: Admin Seat (Big Center) */
        .admin-row { display: flex; justify-content: center; }
        .admin-seat .avatar { width: 75px; height: 75px; border-color: #ff4757; color: #ff4757; font-size: 28px; border-width: 3px; }
        .admin-seat.occupied .avatar { border-style: solid; box-shadow: 0 0 15px rgba(255, 71, 87, 0.5); }

        /* Row 2: Co-Admin Seats */
        .co-admin-row { display: flex; justify-content: space-around; padding: 0 40px; }
        .co-admin-seat .avatar { border-color: #ffa502; color: #ffa502; border-width: 2.5px; }
        .co-admin-seat.occupied .avatar { border-style: solid; box-shadow: 0 0 10px rgba(255, 165, 2, 0.4); }

        /* Row 3: Members Grid (6 Seats) */
        .members-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 10px; justify-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }

        /* Controls (Mute/Unmute) */
        .controls-bar { display: flex; justify-content: center; gap: 20px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 15px; }
        .btn-control { background: #0f3460; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .btn-control:hover { transform: scale(1.05); }
        .btn-control.active { background: #ff4757; }

        /* Gift Box & Coins */
        .gift-box { background: rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .gift-title { font-size: 12px; text-transform: uppercase; color: #00adb5; margin-bottom: 8px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .coins-list { display: flex; justify-content: space-between; overflow-x: auto; gap: 10px; padding-bottom: 5px; }
        .coin-item { min-width: 65px; background: rgba(0,0,0,0.3); padding: 8px 5px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .coin-item:hover { border-color: #ffd700; background: rgba(255, 215, 0, 0.1); }
        .coin-icon { color: #ffd700; font-size: 16px; margin-bottom: 4px; }
        .coin-val { font-size: 11px; font-weight: bold; display: block; }
        .coin-gift { font-size: 9px; color: #aaa; }

        /* Comment/Chat Box */
        .chat-section { background: rgba(0, 0, 0, 0.3); border-radius: 15px; height: 180px; display: flex; flex-direction: column; border: 1px solid rgba(255, 255, 255, 0.05); }
        .chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 6px; }
        .msg { background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 8px; width: fit-content; max-width: 90%; }
        .msg-user { color: #00adb5; font-weight: bold; margin-right: 5px; }
        .msg-sys { color: #ffa502; font-style: italic; }

        /* Input and Emoji Bar Layout */
        .chat-input-area { display: flex; flex-direction: column; gap: 5px; padding: 8px; background: rgba(0,0,0,0.2); border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; }
        .emoji-bar { display: flex; justify-content: space-around; font-size: 20px; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .emoji-btn { cursor: pointer; transition: transform 0.1s; }
        .emoji-btn:hover { transform: scale(1.2); }
        
        .input-row { display: flex; gap: 8px; }
        .chat-input { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 8px 15px; color: white; font-size: 13px; outline: none; }
        .btn-send { background: #00adb5; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<!-- Step 1: Name Input Pop-up (Sign Up) -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <i class="fa-solid fa-radio login-logo"></i>
        <div class="login-title">Sathi Audio Live</div>
        <input type="text" id="usernameInput" class="login-input" placeholder="আপনার সুন্দর নামটি লিখুন..." maxlength="15" onkeypress="handleLoginKeyPress(event)">
        <button class="btn-enter" onclick="enterRoom()">রুমে প্রবেশ করুন</button>
    </div>
</div>

<!-- Header (Always Visible after Enter) -->
<div class="header" id="appHeader" style="display: none;">
    <div class="logo-area">
        <i class="fa-solid fa-radio logo-icon"></i>
        <span class="logo-text">Sathi Audio Live</span>
    </div>
</div>

<!-- Step 2: Main Application Interface -->
<div class="app-content" id="appContent">
    <!-- 9 Seats Stage -->
    <div class="stage">
        <!-- Admin Row (1 Big Seat) -->
        <div class="admin-row">
            <div class="seat admin-seat" id="seat-1" onclick="toggleSeat(1)">
                <div class="emoji-bubble" id="bubble-1"></div>
                <div class="avatar"><i class="fa-solid fa-crown"></i></div>
                <div class="seat-name" id="name-1">১. এডমিন সিট</div>
            </div>
        </div>

        <!-- Co-Admin Row (2 Seats) -->
        <div class="co-admin-row">
            <div class="seat co-admin-seat" id="seat-2" onclick="toggleSeat(2)">
                <div class="emoji-bubble" id="bubble-2"></div>
                <div class="avatar"><i class="fa-solid fa-user-shield"></i></div>
                <div class="seat-name" id="name-2">২. কো-এডমিন</div>
            </div>
            <div class="seat co-admin-seat" id="seat-3" onclick="toggleSeat(3)">
                <div class="emoji-bubble" id="bubble-3"></div>
                <div class="avatar"><i class="fa-solid fa-user-shield"></i></div>
                <div class="seat-name" id="name-3">৩. কো-এডমিন</div>
            </div>
        </div>

        <!-- Members Grid (6 General Seats) -->
        <div class="members-grid">
            <div class="seat" id="seat-4" onclick="toggleSeat(4)">
                <div class="emoji-bubble" id="bubble-4"></div>
                <div class="avatar">৪</div>
                <div class="seat-name" id="name-4">ফ্রি সিট</div>
            </div>
            <div class="seat" id="seat-5" onclick="toggleSeat(5)">
                <div class="emoji-bubble" id="bubble-5"></div>
                <div class="avatar">৫</div>
                <div class="seat-name" id="name-5">ফ্রি সিট</div>
            </div>
            <div class="seat" id="seat-6" onclick="toggleSeat(6)">
                <div class="emoji-bubble" id="bubble-6"></div>
                <div class="avatar">৬</div>
                <div class="seat-name" id="name-6">ফ্রি সিট</div>
            </div>
            <div class="seat" id="seat-7" onclick="toggleSeat(7)">
                <div class="emoji-bubble" id="bubble-7"></div>
                <div class="avatar">৭</div>
                <div class="seat-name" id="name-7">ফ্রি সিট</div>
            </div>
            <div class="seat" id="seat-8" onclick="toggleSeat(8)">
                <div class="emoji-bubble" id="bubble-8"></div>
                <div class="avatar">৮</div>
                <div class="seat-name" id="name-8">ফ্রি সিট</div>
            </div>
            <div class="seat" id="seat-9" onclick="toggleSeat(9)">
                <div class="emoji-bubble" id="bubble-9"></div>
                <div class="avatar">৯</div>
                <div class="seat-name" id="name-9">ফ্রি সিট</div>
            </div>
        </div>
    </div>

    <!-- Live Control Tools (Mute/Unmute) -->
    <div class="controls-bar">
        <button class="btn-control" id="muteBtn" onclick="toggleMute()">
            <i id="micIcon" class="fa-solid fa-microphone-slash"></i>
        </button>
    </div>

    <!-- Coins Gift Box -->
    <div class="gift-box">
        <div class="gift-title"><i class="fa-solid fa-gift"></i> গিফট বক্স (কয়েন সেন্ট)</div>
        <div class="coins-list">
            <div class="coin-item" onclick="sendGift('🌹 গোলাপ')">
                <i class="fa-solid fa-coins coin-icon"></i>
                <span class="coin-val">১০ কয়েন</span>
                <span class="coin-gift">গোলাপ</span>
            </div>
            <div class="coin-item" onclick="sendGift('🍫 চকলেট')">
                <i class="fa-solid fa-coins coin-icon"></i>
                <span class="coin-val">৫০ কয়েন</span>
                <span class="coin-gift">চকলেট</span>
            </div>
            <div class="coin-item" onclick="sendGift('👑 মুকুট')">
                <i class="fa-solid fa-coins coin-icon"></i>
                <span class="coin-val">১০০ কয়েন</span>
                <span class="coin-gift">মুকুট</span>
            </div>
            <div class="coin-item" onclick="sendGift('🚗 গাড়ি')">
                <i class="fa-solid fa-coins coin-icon"></i>
                <span class="coin-val">৫০০ কয়েন</span>
                <span class="coin-gift">গাড়ি</span>
            </div>
            <div class="coin-item" onclick="sendGift('🛸 রকেট')">
                <i class="fa-solid fa-coins coin-icon"></i>
                <span class="coin-val">১০০০ কয়েন</span>
                <span class="coin-gift">রকেট</span>
            </div>
        </div>
    </div>

    <!-- Comment Section -->
    <div class="chat-section">
        <div class="chat-messages" id="chatMessages">
            <div class="msg msg-sys">Sathi Audio Live রুমে আপনাকে স্বাগতম! ❤️</div>
        </div>
        
        <div class="chat-input-area">
            <div class="emoji-bar">
                <span class="emoji-btn" onclick="sendEmoji('❤️')">❤️</span>
                <span class="emoji-btn" onclick="sendEmoji('😂')">😂</span>
                <span class="emoji-btn" onclick="sendEmoji('😮')">😮</span>
                <span class="emoji-btn" onclick="sendEmoji('🔥')">🔥</span>
                <span class="emoji-btn" onclick="sendEmoji('👏')">👏</span>
                <span class="emoji-btn" onclick="sendEmoji('😭')">😭</span>
            </div>
            <div class="input-row">
                <input type="text" id="msgInput" class="chat-input" placeholder="এখানে মেসেজ লিখুন..." onkeypress="handleKeyPress(event)">
                <button class="btn-send" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = "https://your-backend-app.onrender.com"; 
    const socket = io(BACKEND_URL);

    let isMuted = true;
    let currentSeat = null;
    let myName = "";

    // পপ-আপ থেকে নাম ইনপুট নিয়ে রুমে ঢোকার ফাংশন
    function enterRoom() {
        const nameInput = document.getElementById('usernameInput').value.trim();
        if (!nameInput) {
            alert("অনুগ্রহ করে একটি নাম লিখুন!");
            return;
        }
        myName = nameInput;
        
        // পপ-আপ হাইড করা এবং মেইন অ্যাপ শো করা
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('appHeader').style.display = 'flex';
        document.getElementById('appContent').style.display = 'flex';
        
        addSystemMessage(`👋 ${myName} রুমে যুক্ত হয়েছেন!`);
    }

    function handleLoginKeyPress(e) {
        if (e.key === 'Enter') enterRoom();
    }

    // সিটে বসা বা নামার ফাংশন
    function toggleSeat(seatId) {
        const seatEl = document.getElementById(`seat-${seatId}`);
        const nameEl = document.getElementById(`name-${seatId}`);
        
        if (currentSeat === seatId) {
            // সিট থেকে নামা
            seatEl.classList.remove('occupied');
            nameEl.innerText = (seatId === 1) ? '১. এডমিন সিট' : (seatId === 2 || seatId === 3) ? 'কো-এডমিন' : 'ফ্রি সিট';
            addSystemMessage(`${myName} সিট থেকে নেমে গেছেন।`);
            currentSeat = null;
            
            // সিট থেকে নামলে স্বয়ংক্রিয় মিউট করা
            if(!isMuted) toggleMute();
        } else {
            // অন্য সিটে বসা
            if(currentSeat !== null) {
                alert("আপনি অলরেডি একটি সিটে আছেন! আগে সেটি ছাড়ুন।");
                return;
            }
            seatEl.classList.add('occupied');
            nameEl.innerText = myName; // এখানে ইউজারের সেট করা নাম শো করবে
            addSystemMessage(`${myName} এখন সিট নম্বর ${seatId}-এ বসেছেন।`);
            currentSeat = seatId;
        }
    }

    // মিউট-আনমিউট হ্যান্ডলার
    function toggleMute() {
        if (!currentSeat) {
            alert("কথা বলতে হলে প্রথমে যেকোনো একটি সিটে বসুন!");
            return;
        }
        isMuted = !isMuted;
        const micIcon = document.getElementById('micIcon');
        const muteBtn = document.getElementById('muteBtn');

        if (isMuted) {
            micIcon.className = "fa-solid fa-microphone-slash";
            muteBtn.classList.remove('active');
            addSystemMessage(`${myName} নিজেকে মিউট করেছেন।`);
        } else {
            micIcon.className = "fa-solid fa-microphone";
            muteBtn.classList.add('active');
            addSystemMessage(`${myName} এখন আনমিউট (কথা বলছেন)।`);
        }
    }

    // মেসেজ সেন্ড করা
    function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        const chatBox = document.getElementById('chatMessages');
        const msgDiv = document.createElement('div');
        msgDiv.className = "msg";
        msgDiv.innerHTML = `<span class="msg-user">${myName}:</span>${text}`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        input.value = "";
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function addSystemMessage(text) {
        const chatBox = document.getElementById('chatMessages');
        const msgDiv = document.createElement('div');
        msgDiv.className = "msg msg-sys";
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // ইমোজি বাবল সিস্টেম
    function sendEmoji(emoji) {
        if (!currentSeat) {
            alert("সিটের ওপর ইমোজি উড়াতে প্রথমে একটি সিটে বসুন!");
            return;
        }
        const bubble = document.getElementById(`bubble-${currentSeat}`);
        bubble.innerText = emoji;
        bubble.classList.add('show');

        setTimeout(() => {
            bubble.classList.remove('show');
        }, 1500);
    }

    // গিফট পাঠানো
    function sendGift(giftName) {
        addSystemMessage(`🎉 ${myName} রুমে সবাইকে একটি ${giftName} গিফট করেছেন!`);
    }
</script>

</body>
</html>
